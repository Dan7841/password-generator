<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>

    <div class="password-container">
        <h2 id="title">Generate a random password</h2>
        <p id="length-txt">Password Length</p>
        <input type="number" id="password-length" value="15" min="4" max="25">
        <div class="options">
            <label><input type="checkbox" id="include-uppercase" checked> Uppercase</label>
            <label><input type="checkbox" id="include-lowercase" checked> Lowercase</label>
            <label><input type="checkbox" id="include-numbers" checked> Numbers</label>
            <label><input type="checkbox" id="include-symbols" checked> Symbols</label>
        </div>
        <button id="generate-btn">Generate</button>
        <div id="password-one"></div>
        <div id="password-two"></div>

        <div id="strength-container">
            Strength: <span id="strength-status">---</span>
        </div>
    </div>
    
</body>
</html>
